<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Férias do Pierre</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --accent-color: #fbbf24;
        }

        body { 
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container { 
            text-align: center; 
            background: rgba(0, 0, 0, 0.6);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.1);
            z-index: 10;
        }

        h1 { text-transform: uppercase; letter-spacing: 5px; font-size: 1.2rem; margin-bottom: 10px; color: #ddd; }
        .target-name { font-size: 2.5rem; margin-top: 10px; color: var(--accent-color); text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }

        #timer { 
            font-size: 3.5rem; 
            font-weight: bold; 
            display: flex; 
            gap: 20px; 
            justify-content: center; 
            flex-wrap: wrap;
            margin: 30px 0;
        }

        .unit { 
            background: rgba(255, 255, 255, 0.1); 
            padding: 20px; 
            border-radius: 15px; 
            min-width: 100px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        }

        .label { display: block; font-size: 0.9rem; text-transform: uppercase; color: var(--accent-color); margin-top: 5px; }

        /* Estilo do Pato */
        .duck {
            position: absolute;
            bottom: 20px;
            font-size: 50px;
            white-space: nowrap;
            animation: walk 12s linear infinite;
            user-select: none;
        }

        @keyframes walk {
            from { left: -100px; }
            to { left: 100%; }
        }

        @media (max-width: 600px) { 
            #timer { font-size: 2rem; gap: 10px; }
            .unit { min-width: 70px; padding: 10px; }
            .target-name { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Faltam...</h1>
        <div id="timer">Carregando...</div>
        <div class="target-name">PARA AS FÉRIAS DO PIERRE 😎</div>
    </div>

    <div class="duck">🦆🕶️</div>

    <script>
        // Data alvo: 30 de Setembro de 2026 (Setembro tem 30 dias!)
        const targetDate = new Date("September 30, 2026 16:30:00").getTime();

        const updateTimer = setInterval(() => {
            const now = new Date().getTime();
            const distance = targetDate - now;

            // Cálculos de tempo
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            // Exibição
            document.getElementById("timer").innerHTML = `
                <div class="unit">${days}<span class="label">Dias</span></div>
                <div class="unit">${hours}<span class="label">Horas</span></div>
                <div class="unit">${minutes}<span class="label">Min</span></div>
                <div class="unit">${seconds}<span class="label">Seg</span></div>
            `;

            // Quando a contagem terminar
            if (distance < 0) {
                clearInterval(updateTimer);
                document.getElementById("timer").innerHTML = "PARTIU FÉRIAS!";
                document.querySelector("h1").style.display = "none";
            }
        }, 1000);
    </script>
</body>
</html>
